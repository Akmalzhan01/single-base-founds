services:
  - type: web
    name: karavan-base
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install --omit=dev --legacy-peer-deps
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: DEFAULT_FOUNDATION_ID
        sync: false
